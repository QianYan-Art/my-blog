name: Sync KBase Articles

on:
  workflow_dispatch:
  schedule:
    - cron: "20 */6 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout blog
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check KBase token
        env:
          KBASE_READ_TOKEN: ${{ secrets.KBASE_READ_TOKEN }}
        run: |
          if [ -z "$KBASE_READ_TOKEN" ]; then
            echo "::error::Missing repository secret KBASE_READ_TOKEN. Create a fine-grained GitHub token with read-only Contents access to QianYan-Art/QianYan-KBase."
            exit 1
          fi
          curl -fsS \
            -H "Authorization: Bearer $KBASE_READ_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/QianYan-Art/QianYan-KBase/git/trees/main?recursive=1" \
            > /dev/null || {
              echo "::error::KBASE_READ_TOKEN cannot read QianYan-Art/QianYan-KBase. Check token expiration, selected repository, and Contents read-only permission."
              exit 1
            }

      - name: Sync articles from private KBase
        env:
          KBASE_SOURCE: github
          KBASE_OWNER: QianYan-Art
          KBASE_REPO: QianYan-KBase
          KBASE_BRANCH: main
          KBASE_PUBLIC_DIR: public
          GITHUB_TOKEN: ${{ secrets.KBASE_READ_TOKEN }}
        run: npm run sync:kbase

      - name: Commit generated articles
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: sync kbase articles"
          file_pattern: assets/data/articles.json posts/kbase/*.html
